name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        default: test
        options:
          - test
          - preproduction
          - production
      image_tag:
        description: Image tag to deploy
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: ${{ github.event.inputs.environment }} deployment
    runs-on: ubuntu-latest
    concurrency: deploy_${{ github.event.inputs.environment }}
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.deploy_app.outputs.deploy-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy App to ${{ github.event.inputs.environment }}
        id: deploy_app
        uses: ./.github/actions/deploy/
        with:
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          environment: ${{ github.event.inputs.environment }}
          sha: ${{ github.event.inputs.image_tag }}
